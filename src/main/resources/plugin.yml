name: SummitRaffle
version: '${project.version}'
main: com.summitcraft.summitraffle.SummitRaffle
api-version: '1.21'
description: A raffle plugin for SummitCraft
authors: [ SummitCraft ]

commands:
  raffle:
    description: Main raffle command.
    usage: /raffle <start|join|stop>
    aliases: [ rf ]

permissions:
  raffle.start:
    description: Allows starting a raffle (hold item in hand).
    default: op
  raffle.stop:
    description: Allows force-stopping an active raffle (returns item to creator).
    default: op
  raffle.join:
    description: Allows joining an active raffle.
    default: true
  raffle.default:
    description: Default cooldown tier (300s unless overridden in config).
    default: true
  raffle.vip:
    description: VIP cooldown tier (180s by default).
    default: false
  raffle.mvp:
    description: MVP cooldown tier (60s by default).
    default: false
