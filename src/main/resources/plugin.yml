name: SummitRaffle
version: '${project.version}'
main: com.summitcraft.summitraffle.SummitRaffle
api-version: '1.21'
description: A raffle plugin for SummitCraft
authors: [ SummitCraft ]

commands:
  raffle:
    description: Main raffle command.
    usage: /raffle <start|join|stop|reload>
    aliases: [ rf ]

permissions:

  # ── Admin ─────────────────────────────────────
  raffle.stop:
    description: Force-cancel an active raffle. Prize is returned to the creator.
    default: op

  raffle.reload:
    description: Reload config.yml without restarting the server.
    default: op

  # ── Starting ──────────────────────────────────
  # raffle.start grants the ability to run /raffle start.
  # Cooldown is determined separately by whichever raffle.cooldown.<tier>
  # permission the player holds — they receive the LOWEST value they qualify for.
  raffle.start:
    description: Allows starting a raffle by holding an item and running /raffle start.
    default: op

  raffle.cooldown.default:
    description: "Default start cooldown tier. Cooldown duration set in config.yml under cooldowns.default (default: 300s)."
    default: true

  raffle.cooldown.vip:
    description: "VIP start cooldown tier. Cooldown duration set in config.yml under cooldowns.vip (default: 180s)."
    default: false

  raffle.cooldown.mvp:
    description: "MVP start cooldown tier. Cooldown duration set in config.yml under cooldowns.mvp (default: 60s)."
    default: false

  # ── Joining ───────────────────────────────────
  raffle.join:
    description: Allows entering an active raffle with /raffle join.
    default: true
