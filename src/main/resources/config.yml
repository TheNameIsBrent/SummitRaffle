# ════════════════════════════════════════════════
#   SummitRaffle  —  config.yml
# ════════════════════════════════════════════════
#
# COLOUR CODE GUIDE
# ─────────────────
# Standard codes    &6 &a &c &l &r etc. (the usual & codes)
#
# Hex colour        &#RRGGBB
#   Example:  &#FF5733Hello  →  renders "Hello" in #FF5733
#
# Gradient          <gradient:#HEX1:#HEX2>text</gradient>
#   Fades each character across the text.
#   Example:  <gradient:#FF0000:#0000FF>Rainbow</gradient>
#   Multi-stop:  <gradient:#FF0000:#FFFF00:#00FF00>R → Y → G</gradient>
#   With formatting:  <gradient:#FFD700:#FFA500>&lBold Gold</gradient>
#
# Center            <center>text</center>
#   Centers the line in the default Minecraft chat window.
#   Example:  <center>&eWelcome!</center>
#   Works with all other codes:
#   <center><gradient:#FFD700:#FF8C00>&l✦ HELLO ✦</gradient></center>
#
# All syntaxes can be mixed freely in any message.
# ════════════════════════════════════════════════

# Prefix shown wherever {prefix} appears in a message below.
prefix: "<gradient:#FFD700:#FFA500>[SummitRaffle]</gradient>&r"

# How long (seconds) the raffle entry window stays open.
duration: 30

# ── Cooldowns ──────────────────────────────────
# Seconds a player must wait before starting another raffle.
# A player always receives the LOWEST cooldown they qualify for.
# Permission node format:  raffle.cooldown.<tier>
# Add as many tiers as you like.
cooldowns:
  default: 300   # raffle.cooldown.default — 5 minutes (all players)
  vip:     180   # raffle.cooldown.vip    — 3 minutes
  mvp:     60    # raffle.cooldown.mvp    — 1 minute

# ── Messages ───────────────────────────────────
# Supports: & codes, &#RRGGBB hex, <gradient:#HEX1:#HEX2>text</gradient>
# Placeholders: {prefix} {prize} {player} {seconds} {count} {item}
messages:

  # ── Per-player feedback ──────────────────────
  usage:                 "{prefix} &7Usage: /raffle <start|join|stop|reload>"
  no-permission:         "{prefix} &cYou don't have permission to do that."
  players-only:          "{prefix} &cThis command can only be used by players."
  raffle-already-active: "{prefix} &cA raffle is already in progress!"
  must-hold-item:        "{prefix} &cYou must be holding an item to start a raffle."
  join-success:          "{prefix} &aYou've entered the raffle &7— &agood luck!"
  already-joined:        "{prefix} &eYou've already entered this raffle."
  creator-cannot-join:   "{prefix} &cYou can't enter your own raffle."
  no-active-raffle:      "{prefix} &cThere is no active raffle at the moment."
  on-cooldown:           "{prefix} &cPlease wait &e{seconds}s &cbefore starting another raffle."
  prize-returned:        "{prefix} &aYour &e{prize} &ahas been returned to your inventory."
  inventory-full-drop:   "{prefix} &eInventory full &7— &eyour prize was dropped at your feet."
  pending-prize-received: "{prefix} &aWelcome back! Pending prize delivered: &e{prize}&a."
  pending-prize-full:    "{prefix} &ePending prize &e{prize} &edropped at your feet &7(inventory full)&e."
  raffle-cancelled:      "{prefix} &cRaffle cancelled by &e{player}&c. Prize is being returned."
  config-reloaded:       "{prefix} &aConfiguration reloaded."

  # ── Announcement panel ────────────────────────
  announce-separator:   "<center>&6▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</center>"
  announce-header:      "<center><gradient:#FFD700:#FF8C00>&l✦ RAFFLE STARTED ✦</gradient></center>"
  announce-prize:       "<center>&7Prize: <gradient:#00BFFF:#1E90FF>&l{prize}</gradient></center>"
  announce-started-by:  "<center>&7Started by: &f&l{player}</center>"
  announce-join-button: "<gradient:#00C853:#64DD17>&l[ Click here to join! ]</gradient>"
  announce-join-hover:  "&eClick to join the raffle!"
  announce-warning:     "<center>&c⚠ &7Make sure you have a free inventory slot!</center>"

  # ── Countdown ─────────────────────────────────
  countdown:            "{prefix} &e{seconds}s &7remaining for &b{prize} &8— &aClick to join!"
  countdown-hover:      "&eClick to join the raffle!"

  # ── Resolution ────────────────────────────────
  entries-closed:       "{prefix} &7Entries closed for &b{prize} &7(&e{count} entrant(s)&7)."
  drawing:              "<center><gradient:#AAAAAA:#FFFFFF>&lDrawing a winner...</gradient></center>"

  # ── Winner panel ──────────────────────────────
  winner-separator:     "<center>&6▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</center>"
  winner-header:        "<center><gradient:#FFD700:#FF8C00>&l✦ RAFFLE WINNER ✦</gradient></center>"
  winner-name:          "<center>&7Winner: <gradient:#FFD700:#FFA500>&l{player}</gradient></center>"
  winner-prize:         "<center>&7Prize: <gradient:#00BFFF:#1E90FF>&l{prize}</gradient></center>"
  winner-congrats:      "<center><gradient:#00C853:#64DD17>&lCongratulations!</gradient></center>"

  # ── No participants ───────────────────────────
  no-participants:      "{prefix} &7The raffle for &b{prize} &7ended with no participants. Item returned."
