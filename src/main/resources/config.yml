# ──────────────────────────────────────────────
#   SummitRaffle Configuration
# ──────────────────────────────────────────────

# Prefix shown wherever {prefix} appears in a message below.
# Supports & colour codes.
prefix: "&6[SummitRaffle]&r"

# How long (seconds) the raffle runs before entries close.
duration: 30

# ── Cooldowns ──────────────────────────────────
# Seconds a player must wait before starting another raffle.
# Player receives the LOWEST cooldown they qualify for.
# Permission node: raffle.<tier>
cooldowns:
  default: 300   # raffle.default — 5 minutes
  vip:     180   # raffle.vip    — 3 minutes
  mvp:     60    # raffle.mvp    — 1 minute

# ── Messages ───────────────────────────────────
# All player-facing strings. Supports & colour codes.
# Available placeholders: {prefix} {prize} {player} {seconds} {count} {item}
messages:

  # ── Per-player feedback ──────────────────────
  usage:                 "{prefix} &7Usage: /raffle <start|join>"
  no-permission:         "{prefix} &cYou don't have permission to do that."
  players-only:          "{prefix} &cOnly players can use this command."
  raffle-already-active: "{prefix} &cA raffle is already running!"
  must-hold-item:        "{prefix} &cHold the item you want to raffle in your main hand."
  join-success:          "{prefix} &aYou have entered the raffle. Good luck!"
  already-joined:        "{prefix} &eYou have already entered this raffle."
  creator-cannot-join:   "{prefix} &cYou cannot join your own raffle."
  no-active-raffle:      "{prefix} &cThere is no active raffle right now."
  on-cooldown:           "{prefix} &cYou must wait &e{seconds}s &cbefore starting another raffle."
  prize-returned:        "{prefix} &aNo one entered — your &e{prize} &ahas been returned to your inventory."
  inventory-full-drop:   "{prefix} &eYour inventory was full! Your prize has been dropped at your feet."
  pending-prize-received: "{prefix} &aWelcome back! Your pending prize has been added: &e{prize}&a."
  pending-prize-full:    "{prefix} &eInventory full — your pending prize &e{prize} &ehas been dropped at your feet."

  # ── Announcement panel (broadcast on raffle start) ───
  # These lines are auto-centered in chat.
  announce-separator:   "&6&m                                        "
  announce-header:      "&e&l✦ RAFFLE STARTED ✦"
  announce-prize:       "&7Prize: &b&l{prize}"
  announce-started-by:  "&7Started by: &f&l{player}"
  announce-join-button: "&a&l[ Click here to join! ]"
  announce-join-hover:  "&eClick to join the raffle!"
  announce-warning:     "&c⚠ Make sure you have a free inventory slot!"

  # ── Countdown (broadcast at 30s, 20s, 10s, 5-1s) ────
  countdown:            "&6[Raffle] &e{seconds}s &7remaining for &b{prize} &8— &aClick to join!"
  countdown-hover:      "&eClick to join the raffle!"

  # ── Resolution broadcasts ─────────────────────
  entries-closed:       "&6[Raffle] &7Entries closed for &b{prize} &7(&e{count} participant(s)&7)."
  drawing:              "&6[Raffle] &eDrawing a winner&7..."

  # ── Winner panel (auto-centered) ─────────────
  winner-separator:     "&6&m                                        "
  winner-header:        "&6&l✦ RAFFLE WINNER ✦"
  winner-name:          "&7Winner: &e&l{player}"
  winner-prize:         "&7Prize:  &b&l{prize}"
  winner-congrats:      "&a&lCongratulations!"

  # ── No participants ───────────────────────────
  no-participants:      "&6[Raffle] &7The raffle for &b{prize} &7ended with no participants. Item returned to the host."
